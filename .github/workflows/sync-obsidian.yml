name: Sync Obsidian to Google Drive

on:
  push:
    branches:
      - master
    paths:
      - 'obsidian/**'
      - '.github/workflows/sync-obsidian.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync Obsidian folder to Google Drive
        run: |
          FOLDER_ID="${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}"
          
          # Sync entire folder recursively using drive CLI
          gcloud drive files list --drive-id="$FOLDER_ID" --format="json" > /tmp/existing_files.json
          
          # Upload recursively - this creates folders and files
          gcloud drive files upload-recursive ./obsidian --parent="$FOLDER_ID" --force-async
          
          echo "Sync complete!"