name: Sync Obsidian to Google Drive

on:
  push:
    branches:
      - master
    paths:
      - 'obsidian/**'
      - '.github/workflows/sync-obsidian.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: obsidian-sync-494307
          service_account_key: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          export_default_credentials: true

      - name: Authorize Google Drive access
        run: |
          gcloud auth activate-service-account --key-file=- <<< '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}'

      - name: Upload to Google Drive
        run: |
          FOLDER_ID='${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}'
          
          # Install drive CLI
          go install github.com/odeke-em/drive/cmd/drive@latest
          
          # Push obsidian folder to Google Drive
          drive push -files -no-prompt -destination "$FOLDER_ID" ./obsidian

      - name: Verify sync
        run: echo "Obsidian folder synced to Google Drive successfully!"