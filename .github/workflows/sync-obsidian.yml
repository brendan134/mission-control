name: Sync Obsidian to Google Drive

on:
  push:
    branches:
      - master
    paths:
      - 'obsidian/**'
      - '.github/workflows/sync-obsidian.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload folder to Google Drive
        uses: younes91/gdrive-upload@v2
        with:
          folder_id: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          folder_path: ./obsidian
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          delete_extra: false