name: Sync Obsidian to Google Drive

on:
  push:
    branches:
      - master
    paths:
      - 'obsidian/**'
      - '.github/workflows/sync-obsidian.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'

      - name: Install drive CLI
        run: go install github.com/odeke-em/drive/cmd/drive@latest

      - name: Push to Google Drive
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          drive push -files -no-prompt -destination '${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}' ./obsidian

      - name: Verify sync
        run: echo "Obsidian folder synced to Google Drive successfully!"